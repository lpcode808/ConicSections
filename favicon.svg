<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b34"/>
      <stop offset="1" stop-color="#17376a"/>
    </linearGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fde047"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>

  <!-- ellipse shell -->
  <ellipse cx="32" cy="32" rx="23" ry="16" fill="none" stroke="#8dd8ff" stroke-width="4"/>

  <!-- focal points -->
  <circle cx="22" cy="32" r="3.2" fill="#f97316"/>
  <circle cx="42" cy="32" r="3.2" fill="#60a5fa"/>

  <!-- reflected ray -->
  <path d="M22 32 L35 21 L42 32" fill="none" stroke="url(#ray)" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
